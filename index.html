<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Fix for "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // This happens when polyfills like formdata-polyfill try to overwrite window.fetch
      (function() {
        try {
          var originalFetch = window.fetch;
          var fetchValue = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return fetchValue; },
            set: function(v) { fetchValue = v; },
            configurable: true
          });
        } catch (e) {
          console.warn('Could not make window.fetch writable:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
